name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv pip install --system -e '.[test]'
      - run: ruff check .
      - run: ruff format --check .

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv pip install --system -e '.[test]'
      - run: bandit -c pyproject.toml -q -r books loaning skoufas_library_project manage.py

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv pip install --system -e '.[test]'
      - run: pip-audit

  djlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv pip install --system -e '.[test]'
      - run: djlint . --lint
      - run: djhtml --check $(git ls-files '*.html')

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv pip install --system -e '.[test]'
      - run: shellcheck scripts/restart scripts/restart-venv scripts/update-messages

  check-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv pip install --system -e '.[test]'
      - run: check-manifest

  pylint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv pip install --system -e '.[test]'
      - run: pylint .

  migrations-check:
    runs-on: ubuntu-latest
    env:
      DJANGO_CURRENT_SECRET_KEY: "ci-only-dummy-key"
      DJANGO_OLD_SECRET_KEY: "ci-only-dummy-old-key"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv pip install --system -e .
      - run: python manage.py makemigrations --check --dry-run

  mypy:
    runs-on: ubuntu-latest
    env:
      DJANGO_CURRENT_SECRET_KEY: "ci-only-dummy-key"
      DJANGO_OLD_SECRET_KEY: "ci-only-dummy-old-key"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv pip install --system -e '.[test]'
      - run: mypy --ignore-missing-imports .

  migration-linter:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5

    env:
      DJANGO_CURRENT_SECRET_KEY: "ci-only-dummy-key"
      DJANGO_OLD_SECRET_KEY: "ci-only-dummy-old-key"
      DJANGO_DATABASE_NAME: postgres
      DJANGO_DATABASE_USER: postgres
      DJANGO_DATABASE_PASSWORD: postgres
      DJANGO_DATABASE_HOST: localhost
      DJANGO_DATABASE_PORT: 5432

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv pip install --system -e '.[test]'
      - run: python manage.py lintmigrations -v 1
